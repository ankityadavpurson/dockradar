name: CI

# Quality gate: backend tests + frontend production build.
# Runs standalone on PRs; on main it runs inside the "Build and Publish
# Docker Image" workflow via workflow_call, gating the image build
# (see docker-publish.yml `needs: test`).

on:
  pull_request:
    branches: [main]   # only PRs targeting main
  workflow_call:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        working-directory: frontend
        run: yarn build
