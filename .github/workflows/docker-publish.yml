name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Queue concurrent runs per ref so parallel pushes can't race the
# :latest tag; never cancel an in-flight publish.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Quality gate — the image is only built and pushed when tests and the
  # frontend build pass.
  test:
    uses: ./.github/workflows/ci.yml

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # For tag builds, the published image is tagged with the git tag's
      # version — make sure the code inside actually carries that version.
      - name: Verify version consistency (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' backend/app/main.py)
          PKG_VERSION=$(node -p "require('./frontend/package.json').version")
          echo "tag=v$TAG_VERSION  backend=$APP_VERSION  frontend=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$APP_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch — tag v$TAG_VERSION, backend __version__ $APP_VERSION, frontend package.json $PKG_VERSION. Bump the versions before tagging (or use the Release workflow, which does it for you)."
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
