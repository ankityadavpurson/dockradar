name: Bug Report
description: Report a bug or unexpected behaviour in DockRadar
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with `python server.py`
        2. Click "Scan for Updates"
        3. ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (native)
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.2"
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      placeholder: "e.g. 26.1.4"
    validations:
      required: true

  - type: dropdown
    id: docker_connection
    attributes:
      label: Docker connection method
      options:
        - Unix socket (default)
        - TCP (localhost)
        - SSH (remote)
        - TCP with TLS (remote)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant output from `server.py` or the browser console.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am not including any secrets, credentials, or private IPs in this report
          required: true
