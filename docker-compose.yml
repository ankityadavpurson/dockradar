services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./backend/compose_files:/app/backend/compose_files
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HOST: 0.0.0.0
      PORT: 8086
      DOCKER_HOST: unix:///var/run/docker.sock
      HIDDEN_REPOSITORY: ${HIDDEN_REPOSITORY}
    ports:
      - "8086:8086"
    restart: unless-stopped
